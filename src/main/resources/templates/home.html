<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trim-It</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
                radial-gradient(circle at top left,#38bdf822,transparent 30%),
                radial-gradient(circle at bottom right,#8b5cf622,transparent 30%),
                linear-gradient(135deg,#020617,#0f172a,#1e293b);
            overflow:hidden;
            color:white;
            padding:20px;
        }

        /* animated grid */
        body::before{
            content:"";
            position:absolute;
            inset:0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size:40px 40px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
        }

        .bg-blur{
            position:absolute;
            border-radius:50%;
            filter:blur(120px);
            opacity:0.6;
            z-index:0;
            animation:float 8s ease-in-out infinite;
        }

        .blur1{
            width:320px;
            height:320px;
            background:#38bdf8;
            top:-100px;
            left:-80px;
        }

        .blur2{
            width:280px;
            height:280px;
            background:#8b5cf6;
            bottom:-120px;
            right:-80px;
            animation-delay:2s;
        }

        @keyframes float{
            0%,100%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-20px);
            }
        }

        .container{
            position:relative;
            z-index:1;
            width:100%;
            max-width:560px;
            padding:40px;
            border-radius:28px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.12);
            box-shadow:
                0 10px 40px rgba(0,0,0,0.4),
                inset 0 1px 1px rgba(255,255,255,0.1);
            animation:fadeIn 0.8s ease;
        }

        .logo{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:10px;
            margin-bottom:10px;
        }

        .logo-icon{
            width:50px;
            height:50px;
            border-radius:16px;
            background:linear-gradient(135deg,#38bdf8,#8b5cf6);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:1.5rem;
            box-shadow:0 8px 20px rgba(56,189,248,0.35);
        }

        h1{
            font-size:2.4rem;
            font-weight:700;
            letter-spacing:1px;
        }

        h1 span{
            background:linear-gradient(135deg,#38bdf8,#c084fc);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .subtitle{
            text-align:center;
            color:#cbd5e1;
            margin:18px 0 35px;
            font-size:0.95rem;
            line-height:1.6;
        }

        .section{
            margin-bottom:28px;
        }

        .section-title{
            font-size:0.9rem;
            text-transform:uppercase;
            letter-spacing:1px;
            color:#94a3b8;
            margin-bottom:14px;
        }

        form{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
        }

        input[type="text"]{
            flex:1;
            min-width:200px;
            padding:15px 18px;
            border:none;
            border-radius:16px;
            outline:none;
            font-size:0.95rem;
            background:rgba(255,255,255,0.08);
            color:white;
            border:1px solid transparent;
            transition:0.3s ease;
        }

        input[type="text"]::placeholder{
            color:#94a3b8;
        }

        input[type="text"]:focus{
            border:1px solid rgba(56,189,248,0.5);
            background:rgba(255,255,255,0.12);
            box-shadow:0 0 0 4px rgba(56,189,248,0.15);
        }

        button{
            padding:14px 22px;
            border:none;
            border-radius:16px;
            background:linear-gradient(135deg,#38bdf8,#8b5cf6);
            color:white;
            font-size:0.95rem;
            font-weight:600;
            cursor:pointer;
            transition:0.3s ease;
            white-space:nowrap;
        }

        button:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(139,92,246,0.35);
        }

        button:active{
            transform:scale(0.98);
        }

        .result,
        .error{
            margin-top:22px;
            padding:18px;
            border-radius:18px;
            animation:pop 0.4s ease;
        }

        .result{
            background:rgba(34,197,94,0.12);
            border:1px solid rgba(34,197,94,0.3);
        }

        .result-title{
            font-size:0.85rem;
            color:#86efac;
            margin-bottom:10px;
            text-transform:uppercase;
            letter-spacing:1px;
        }

        .result a{
            color:#4ade80;
            text-decoration:none;
            font-weight:500;
            word-break:break-all;
            font-size:1rem;
        }

        .result a:hover{
            text-decoration:underline;
        }

        .error{
            background:rgba(239,68,68,0.12);
            border:1px solid rgba(239,68,68,0.35);
            color:#fca5a5;
        }

        .divider{
            height:1px;
            width:100%;
            background:linear-gradient(to right,transparent,rgba(255,255,255,0.15),transparent);
            margin:30px 0;
        }

        footer{
            margin-top:15px;
            text-align:center;
            font-size:0.8rem;
            color:#64748b;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(25px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @keyframes pop{
            from{
                opacity:0;
                transform:scale(0.95);
            }
            to{
                opacity:1;
                transform:scale(1);
            }
        }

        @media(max-width:600px){

            .container{
                padding:28px;
            }

            form{
                flex-direction:column;
            }

            button{
                width:100%;
            }

            h1{
                font-size:2rem;
            }
        }
    </style>
</head>

<body>

    <div class="bg-blur blur1"></div>
    <div class="bg-blur blur2"></div>

    <div class="container">

        <div class="logo">
            <div class="logo-icon">✂</div>
            <h1>Trim<span>It</span></h1>
        </div>

        <p class="subtitle">
            Transform long messy URLs into sleek,
            shareable short links.
        </p>

        <!-- SHORTEN -->
        <div class="section">
            <div class="section-title">Create Short URL</div>

            <form action="/shorten" method="post">
                <input
                    type="text"
                    name="urlString"
                    placeholder="https://example.com/very/long/url..."
                    required
                />

                <button type="submit">
                    Shorten
                </button>
            </form>
        </div>

        <!-- RESULT -->
        <div class="result" th:if="${shortUrl}">
            <div class="result-title">
                Short URL Generated
            </div>

            <a
                th:href="${shortUrl}"
                th:text="${shortUrl}"
                target="_blank">
            </a>
        </div>

        <!-- ERROR -->
        <div class="error" th:if="${error}">
            <p th:text="${error}"></p>
        </div>

        <div class="divider"></div>

        <!-- REDIRECT -->
        <div class="section">
            <div class="section-title">Open Existing Short Link</div>

            <form action="/redirect" method="get" target="_blank">
                <input type="text" name="code" placeholder="Enter short code..." required />
    <button type="submit">Open</button>
</form>
        </div>

        <footer>
            Built with Spring Boot + Thymeleaf
        </footer>

    </div>

</body>
</html>
